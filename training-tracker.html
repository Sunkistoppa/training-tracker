const weekStart = (date) => {
  const d=new Date(date),day=d.getDay();
  d.setDate(d.getDate()-day+(day===0?-6:1)); d.setHours(0,0,0,0); return d;
};
const dateKey = (date) => {
  const d=new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const weekKey = (date) => dateKey(weekStart(date));
const fmtDate = (date) => { const d=new Date(date); return `${d.getMonth()+1}/${d.getDate()} 星期${TWdays[d.getDay()]}`; };

const STORAGE_KEY = "training_log_v4";
const loadData = () => { try { const v=localStorage.getItem(STORAGE_KEY); return v?JSON.parse(v):{sessions:{},protein:{}}; } catch { return {sessions:{},protein:{}}; } };
const saveData = (d) => { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch(e){} };
const BACKUP_KEY = "training_last_backup";
const getLastBackup = () => { try { return localStorage.getItem(BACKUP_KEY)||null; } catch { return null; } };
const setLastBackup = () => { try { localStorage.setItem(BACKUP_KEY,new Date().toISOString()); } catch {} };
const daysSinceBackup = () => { const l=getLastBackup(); if(!l) return 999; return Math.floor((Date.now()-new Date(l).getTime())/(864e5)); };

const inputSt = {width:"100%",background:"#ffffff12",border:"1px solid #ffffff20",borderRadius:6,padding:"6px 10px",color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box"};
const navBtnSt = {background:"none",border:"none",color:"#94a3b8",fontSize:24,cursor:"pointer",padding:"0 12px",borderRadius:6,lineHeight:1};

function CheckRow({item,checked,onToggle}) {
  const [open,setOpen] = useState(false);
  const info = MOVE_INFO[item.name];
  return (
    <div style={{marginBottom:6,borderRadius:10,overflow:"hidden",border:`1px solid ${checked?"#22c55e33":"#ffffff12"}`,background:checked?"#22c55e08":"#ffffff05"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer"}} onClick={()=>{if(info)setOpen(!open);}}>
        <button onClick={e=>{e.stopPropagation();onToggle();}} style={{width:20,height:20,borderRadius:5,border:"none",flexShrink:0,background:checked?"#22c55e":"#ffffff18",color:"#fff",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{checked?"✓":""}</button>
        <span style={{flex:1,fontSize:13,color:checked?"#22c55e":"#cbd5e1"}}>{item.name}</span>
        {info && <span style={{fontSize:10,color:"#475569"}}>{open?"▲":"▼"}</span>}
      </div>
      {open&&info&&(<div style={{padding:"0 12px 10px 42px",borderTop:"1px solid #ffffff08"}}><p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginTop:8}}>{info.desc}</p></div>)}
    </div>
  );
}

function ExerciseRow({ex,log,onChange}) {
  const [open,setOpen] = useState(false);
  const done=log?.done||false;
  const sets=log?.sets||Array.from({length:ex.sets},()=>({reps:"",weight:""}));
  const toggleDone=(e)=>{e.stopPropagation();onChange({...log,done:!done,sets});};
  const updateSet=(i,field,val)=>{const ns=sets.map((s,idx)=>idx===i?{...s,[field]:val}:s);onChange({...log,done,sets:ns});};
  return (
    <div style={{marginBottom:8,borderRadius:10,overflow:"hidden",border:`1px solid ${done?"#22c55e33":"#ffffff15"}`,background:done?"#22c55e0a":"#ffffff07"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}} onClick={()=>setOpen(!open)}>
        <button onClick={toggleDone} style={{width:22,height:22,borderRadius:6,border:"none",background:done?"#22c55e":"#ffffff20",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{done?"✓":""}</button>
        <span style={{flex:1,fontSize:14,fontWeight:500,color:done?"#22c55e":"#e2e8f0"}}>{ex.name}</span>
        <span style={{fontSize:12,color:"#94a3b8"}}>{ex.sets}組×{ex.repsNote}</span>
        <span style={{fontSize:10,color:"#64748b"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{padding:"0 14px 12px",borderTop:"1px solid #ffffff10"}}>
          {ex.note&&<p style={{fontSize:11,color:"#f59e0b",margin:"8px 0 8px",paddingLeft:32}}>💡 {ex.note}</p>}
          {sets.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginTop:8,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#64748b",width:28}}>#{i+1}</span>
              <input type="number" placeholder="次數" value={s.reps||""} onChange={e=>updateSet(i,"reps",e.target.value)} style={{...inputSt,flex:1}}/>
              {ex.hasWeight&&<input type="number" placeholder="公斤" value={s.weight||""} onChange={e=>updateSet(i,"weight",e.target.value)} style={{...inputSt,flex:1}}/>}
            </div>
          ))}
          {!ex.hasWeight&&<p style={{fontSize:11,color:"#64748b",margin:"8px 0 0",paddingLeft:36}}>僅記錄次數</p>}
        </div>
      )}
    </div>
  );
}

function CardioPanel({log,onChange}) {
  const [open,setOpen] = useState(false);
  const cardioLog=log?.cardio||{};
  const type=cardioLog.type||"";
  const hasDone=cardioLog.done||false;
  const update=(field,val)=>onChange({...log,cardio:{...cardioLog,[field]:val}});
  const toggleDone=(e)=>{e.stopPropagation();update("done",!hasDone);};
  return (
    <div style={{marginTop:10,borderRadius:10,overflow:"hidden",border:`1px solid ${hasDone?"#3b82f633":"#ffffff15"}`,background:hasDone?"#3b82f608":"#ffffff05"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer"}} onClick={()=>setOpen(!open)}>
        <button onClick={toggleDone} style={{width:20,height:20,borderRadius:5,border:"none",flexShrink:0,background:hasDone?"#3b82f6":"#ffffff18",color:"#fff",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{hasDone?"✓":""}</button>
        <span style={{flex:1,fontSize:13,color:hasDone?"#60a5fa":"#cbd5e1",fontWeight:500}}>🏃 有氧訓練</span>
        {hasDone&&type&&<span style={{fontSize:11,color:"#3b82f6"}}>{type==="cycling"?"🚴飛輪":type==="jump_rope"?"⚡跳繩":""}</span>}
        <span style={{fontSize:10,color:"#475569"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{padding:"0 12px 12px",borderTop:"1px solid #ffffff08"}}>

function App() {
  const [data,setData] = useState(()=>loadData());
  const [selectedDate,setSelectedDate] = useState(dateKey(new Date()));
  const [tab,setTab] = useState("today");
  const [showBackupBanner,setShowBackupBanner] = useState(false);
  const todayKey = dateKey(new Date());

  useEffect(()=>{ if(daysSinceBackup()>=7) setShowBackupBanner(true); },[]);

  const save=(nd)=>{ setData(nd); saveData(nd); };
  const selWeekKey = weekKey(new Date(selectedDate));

  // Which core plans done this week with >60% completion
  const getCompletion = (sess) => {
    if(!sess||!sess.planId) return 0;
    const plan = WORKOUT_PLANS[sess.planId];
    if(!plan||!plan.exercises||plan.exercises.length===0) return 0;
    const done = plan.exercises.filter(ex=>sess.exercises?.[ex.id]?.done).length;
    return done / plan.exercises.length;
  };

  const weekCoreDone = CORE_IDS.filter(id=>
    Object.entries(data.sessions||{}).some(([dk,s])=>{
      if(weekKey(new Date(dk))!==selWeekKey||s.planId!==id||!s.active) return false;
      return getCompletion(s) >= 0.6;
    })
  );
  const extraUnlocked = weekCoreDone.length>=3;

  const daySession = data.sessions?.[selectedDate]||{};

  const selectPlan=(planId)=>save({...data,sessions:{...data.sessions,[selectedDate]:{planId,active:true,exercises:{},warmup:{},cooldown:{},startedAt:new Date().toISOString()}}});
  const updateExercise=(exId,exLog)=>save({...data,sessions:{...data.sessions,[selectedDate]:{...daySession,exercises:{...daySession.exercises,[exId]:exLog}}}});
  const updateWarmup=(wm)=>save({...data,sessions:{...data.sessions,[selectedDate]:{...daySession,warmup:wm}}});
  const updateCooldown=(cd)=>save({...data,sessions:{...data.sessions,[selectedDate]:{...daySession,cooldown:cd}}});
  const updateCardio=(sessionLog)=>save({...data,sessions:{...data.sessions,[selectedDate]:sessionLog}});
  const updateProtein=(meals)=>save({...data,protein:{...data.protein,[selectedDate]:meals}});
  const shiftDate=(n)=>{ const d=new Date(selectedDate); d.setDate(d.getDate()+n); setSelectedDate(dateKey(d)); };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download=`training_backup_${dateKey(new Date())}.json`; a.click();
    URL.revokeObjectURL(url); setLastBackup(); setShowBackupBanner(false);
  };
  const importData=()=>{
    const input=document.createElement("input"); input.type="file"; input.accept=".json";
    input.onchange=e=>{ const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{ try { const p=JSON.parse(ev.target.result);
        if(p.sessions!==undefined||p.protein!==undefined){ if(window.confirm("確定要還原備份？目前資料會被覆蓋。")){ save(p); alert("✅ 還原成功！"); } }
        else alert("❌ 檔案格式不對");
      } catch { alert("❌ 讀取失敗"); } };
      reader.readAsText(file);
    }; input.click();
  };

  const logEntries=Object.entries(data.sessions||{}).filter(([,s])=>s.active).sort(([a],[b])=>b.localeCompare(a)).slice(0,30);

  const sharedCardProps=(id)=>({
    log: daySession.planId===id?daySession:null,
    selected: daySession.planId===id&&daySession.active,
    onToggle: ()=>selectPlan(id),
    onExerciseChange: updateExercise,
    onWarmupChange: updateWarmup,
    onCooldownChange: updateCooldown,
    onCardioChange: updateCardio,
  });

  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#e2e8f0",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

      {showBackupBanner&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:"linear-gradient(90deg,#92400e,#b45309)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px #00000060"}}>
          <span style={{fontSize:18}}>💾</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"#fef3c7"}}>超過7天未備份</div>
            <div style={{fontSize:11,color:"#fcd34d"}}>建議現在匯出一份備份檔</div>
          </div>
          <button onClick={exportData} style={{background:"#fbbf24",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,color:"#78350f",cursor:"pointer"}}>立即備份</button>
          <button onClick={()=>setShowBackupBanner(false)} style={{background:"none",border:"none",color:"#fcd34d",fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button>
        </div>
      )}

      <div style={{background:"linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%)",padding:"20px 20px 16px",paddingTop:"max(env(safe-area-inset-top),20px)",borderBottom:"1px solid #ffffff10",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:"#64748b",letterSpacing:2}}>TRAINING LOG</div>
            <div style={{fontSize:20,fontWeight:800,color:"#f1f5f9",marginTop:2}}>訓練記錄</div>
          </div>
          <span style={{fontSize:28}}>🏋️</span>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[["today","📅 訓練日誌"],["log","📋 歷史記錄"]].map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:tab===key?"#3b82f6":"#ffffff10",color:tab===key?"#fff":"#94a3b8",fontSize:13,fontWeight:600}}>{label}</button>

        <div style={{padding:"16px 16px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#ffffff08",borderRadius:12,padding:"10px 4px",marginBottom:16}}>
            <button onClick={()=>shiftDate(-1)} style={navBtnSt}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0"}}>{fmtDate(selectedDate)}</div>
              {selectedDate===todayKey&&<div style={{fontSize:11,color:"#3b82f6",marginTop:2}}>今天</div>}
            </div>
            <button onClick={()=>shiftDate(1)} style={navBtnSt}>›</button>
          </div>

          <ProteinPanel value={data.protein?.[selectedDate]} onChange={updateProtein}/>

          {/* Week progress */}
          <div style={{background:"#ffffff08",borderRadius:12,padding:"12px 16px",marginBottom:16,border:"1px solid #ffffff10"}}>
            <div style={{fontSize:12,color:"#64748b",fontWeight:600,marginBottom:8}}>本週進度（訓練一二三各做一次）</div>
            <div style={{display:"flex",gap:8}}>
              {CORE_IDS.map(id=>{
                const done=weekCoreDone.includes(id),plan=WORKOUT_PLANS[id];
                return (
                  <div key={id} style={{flex:1,borderRadius:8,padding:"8px 4px",textAlign:"center",background:done?`${plan.color}20`:"#ffffff08",border:`1px solid ${done?plan.color:"#ffffff10"}`}}>
                    <div style={{fontSize:16}}>{plan.emoji}</div>
                    <div style={{fontSize:11,color:done?plan.color:"#64748b",marginTop:2}}>{plan.label}</div>
                    {(()=>{
                      const sess = Object.entries(data.sessions||{}).find(([dk,s])=>weekKey(new Date(dk))===selWeekKey&&s.planId===id&&s.active);
                      if(!sess) return null;
                      const pct = Math.round(getCompletion(sess[1])*100);
                      return <div style={{fontSize:10,color:pct>=60?"#22c55e":"#f59e0b",marginTop:2}}>{pct}%{pct>=60?" ✓":""}</div>;
                    })()}
                  </div>
                );
              })}
            </div>
            {extraUnlocked&&<div style={{marginTop:10,padding:"6px 10px",background:"#f59e0b15",borderRadius:8,fontSize:12,color:"#f59e0b"}}>🎉 三種訓練本週各完成 60% 以上！加強版解鎖</div>}
          </div>

          <div style={{fontSize:12,color:"#64748b",fontWeight:600,marginBottom:10,letterSpacing:1}}>選擇今日訓練</div>
          {CORE_IDS.map(id=>(
            <WorkoutCard key={id} plan={WORKOUT_PLANS[id]} locked={false} {...sharedCardProps(id)}/>
          ))}

          <div style={{fontSize:12,color:"#64748b",fontWeight:600,margin:"16px 0 10px",letterSpacing:1}}>
            訓練四 — 空翻感覺恢復
          </div>
          <T4Card plan={WORKOUT_PLANS[T4_ID]} locked={false} {...sharedCardProps(T4_ID)}/>

          <div style={{fontSize:12,color:"#64748b",fontWeight:600,margin:"16px 0 10px",letterSpacing:1}}>單獨有氧</div>
          <CyclingCard plan={WORKOUT_PLANS[T5_ID]} log={daySession.planId===T5_ID?daySession:null} selected={daySession.planId===T5_ID&&daySession.active} locked={false} onToggle={()=>selectPlan(T5_ID)} onCooldownChange={updateCooldown} onCardioChange={updateCardio}/>

          <div style={{fontSize:12,color:"#64748b",fontWeight:600,margin:"16px 0 10px",letterSpacing:1}}>
            加強版訓練 {!extraUnlocked&&<span style={{color:"#ef4444",fontSize:11}}>（三種訓練各做一次且完成 60% 以上才解鎖）</span>}
          </div>
          {EXTRA_IDS.map(id=>{
            const locked=!extraUnlocked&&!(daySession.planId===id&&daySession.active);
            return <WorkoutCard key={id} plan={WORKOUT_PLANS[id]} locked={locked} lockedReason={locked?"未解鎖":""} {...sharedCardProps(id)}/>;
          })}
        </div>
      )}

      {tab==="log"&&(
        <div style={{padding:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:13,color:"#64748b"}}>最近30筆記錄</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={exportData} style={{background:"#ffffff12",border:"1px solid #ffffff20",color:"#94a3b8",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>⬇️ 匯出</button>
              <button onClick={importData} style={{background:"#3b82f615",border:"1px solid #3b82f640",color:"#3b82f6",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>⬆️ 還原</button>
            </div>
          </div>
          {logEntries.length===0&&<div style={{textAlign:"center",color:"#64748b",marginTop:60,fontSize:14}}>還沒有記錄<br/>去完成第一次訓練吧！💪</div>}
          {logEntries.map(([dk,sess])=>{
            const plan=WORKOUT_PLANS[sess.planId]; if(!plan) return null;
            const proteinMeals=data.protein?.[dk]||{};
            const totalProtein=MEALS.reduce((s,m)=>s+(parseFloat(proteinMeals[m.id])||0),0);
            const exercises = plan.sections ? plan.sections.flatMap(s=>s.exercises) : (plan.exercises||[]);
            return (
              <div key={dk} style={{background:"#ffffff08",border:"1px solid #ffffff10",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{fontSize:13,color:"#94a3b8"}}>{fmtDate(dk)}</div>
                  {totalProtein>0&&<div style={{fontSize:12,color:"#fbbf24"}}>🥩 {totalProtein.toFixed(0)}g</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                  <span style={{fontSize:18}}>{plan.emoji}</span>
                  <span style={{fontSize:14,fontWeight:600,color:plan.color}}>{plan.label} — {plan.title}</span>
                </div>
                <div style={{marginTop:8}}>
                  {sess.cardio?.done&&sess.cardio?.type&&(
                    <span style={{fontSize:11,background:"#3b82f615",color:"#60a5fa",borderRadius:20,padding:"2px 8px",display:"inline-block",marginBottom:6}}>
                      {sess.cardio.type==="cycling"?"🚴 飛輪":"⚡ 跳繩"}{sess.cardio.duration?` ${sess.cardio.duration}分`:""}
                      {sess.cardio.hrAvg?` avg ${sess.cardio.hrAvg}bpm`:""}
                    </span>
                  )}
                  {exercises.map(ex=>{ const exLog=sess.exercises?.[ex.id]; if(!exLog?.done) return null;
                    const details=exLog.sets?.filter(s=>s.reps||s.weight).map(s=>[s.reps&&`${s.reps}次`,s.weight&&`${s.weight}kg`].filter(Boolean).join("/")).filter(Boolean).join(" · ")||"";
                    return (<div key={ex.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0"}}><span style={{color:"#22c55e",fontSize:12}}>✓</span><span style={{fontSize:12,color:"#e2e8f0"}}>{ex.name}</span>{details&&<span style={{fontSize:11,color:"#64748b"}}>{details}</span>}</div>);
                  })}
                </div>
                {totalProtein>0&&(
                  <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                    {MEALS.map(m=>{ const v=parseFloat(proteinMeals[m.id])||0; if(!v) return null; return <span key={m.id} style={{fontSize:11,background:"#fbbf2415",color:"#fbbf24",borderRadius:20,padding:"2px 8px"}}>{m.emoji}{m.label} {v}g</span>; })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {selectedDate!==todayKey&&tab==="today"&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:20}}>
          <button onClick={()=>setSelectedDate(todayKey)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:20,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px #3b82f660"}}>回到今天</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
